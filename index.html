<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mãi Yêu Thảo Trang</title>

    <style>
      html,
      body {
        margin: 0;
        overflow: hidden;
        background:
          radial-gradient(circle at top, rgba(255, 90, 150, 0.12), transparent 35%),
          radial-gradient(circle at bottom, rgba(255, 50, 120, 0.08), transparent 40%),
          linear-gradient(135deg, #04040d, #0a1020 45%, #020208);
      }
      canvas {
        display: block;
      }
    </style>
  </head>

  <body>
    <canvas id="canvas"></canvas>

    <script>
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");

      let w, h, cx, cy;

      let particles = [];
      let heartTargets = [];
      let sophiaTargets = [];
      let trangTargets = [];

      const LOOP = 18;

      function rand(a, b) {
        return Math.random() * (b - a) + a;
      }
      function lerp(a, b, t) {
        return a + (b - a) * t;
      }

      function ease(t) {
        return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
      }

      function easeOutBack(t) {
        const c1 = 1.70158;
        const c3 = c1 + 1;
        return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
      }

      function createHeart(count, scale) {
        const pts = [];
        for (let i = 0; i < count; i++) {
          let t = (i / count) * Math.PI * 2;

          let x = 16 * Math.pow(Math.sin(t), 3);
          let y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);

          pts.push({ x: x * scale, y: -y * scale });
        }
        return pts;
      }

      function textPoints(text) {
        const off = document.createElement("canvas");
        const octx = off.getContext("2d");

        off.width = 1600;
        off.height = 500;

        octx.fillStyle = "#fff";
        octx.textAlign = "center";
        octx.textBaseline = "middle";

        let fontSize = Math.min(180, w * 0.13);

        octx.font = `700 ${fontSize}px system-ui`;

        const lines = text.split("\n");
        const lineHeight = fontSize * 1.25;
        const startY = off.height / 2 - ((lines.length - 1) * lineHeight) / 2;
        lines.forEach((line, i) => {
          octx.fillText(line, off.width / 2, startY + i * lineHeight);
        });

        const img = octx.getImageData(0, 0, off.width, off.height).data;

        let pts = [];

        for (let y = 0; y < off.height; y += 4) {
          for (let x = 0; x < off.width; x += 4) {
            let a = img[(y * off.width + x) * 4 + 3];

            if (a > 120)
              pts.push({
                x: x - off.width / 2,
                y: y - off.height / 2,
              });
          }
        }

        return pts;
      }

      function fit(points, count) {
        const res = [];

        for (let i = 0; i < count; i++) {
          let p = points[Math.floor((i * points.length) / count)];
          res.push(p);
        }

        return res;
      }

      function buildTargets(count) {
        heartTargets = fit(createHeart(900, Math.min(w, h) / 95), count);

        sophiaTargets = fit(textPoints("Sophia"), count);

        trangTargets = fit(textPoints("Nguyễn Trần\nThảo Trang"), count);
      }

      function initParticles() {
        particles = [];

        const count = 1600;

        buildTargets(count);

        for (let i = 0; i < count; i++) {
          let a = Math.random() * Math.PI * 2;
          let r = Math.min(w, h) * 0.28;

          particles.push({
            x: cx + Math.cos(a) * r,
            y: cy + Math.sin(a) * r,

            angle: a,
            radius: r,

            size: rand(1, 2.6),

            alpha: rand(0.6, 1),
          });
        }
      }

      function beatScale(t) {
        const beats = [
          { c: 0.2, a: 0.22 },
          { c: 0.5, a: 0.18 },
          { c: 0.8, a: 0.14 },
        ];

        let s = 1;

        for (const b of beats) {
          let d = Math.abs(t - b.c);

          s += Math.exp(-Math.pow(d * 11, 2)) * b.a;
        }

        return s;
      }

      function update(time) {
        const t = time % LOOP;

        ctx.clearRect(0, 0, w, h);

        ctx.globalCompositeOperation = "lighter";

        for (let i = 0; i < particles.length; i++) {
          let p = particles[i];

          let tx,
            ty,
            size = 1;

          if (t < 3) {
            p.angle += 0.01;

            tx = cx + Math.cos(p.angle) * p.radius;
            ty = cy + Math.sin(p.angle) * p.radius * 0.6;
          } else if (t < 5) {
            let tt = ease((t - 3) / 2);

            let hp = heartTargets[i];

            tx = lerp(p.x, cx + hp.x, tt);
            ty = lerp(p.y, cy + hp.y, tt);
          } else if (t < 8) {
            let tt = (t - 5) / 3;

            let hp = heartTargets[i];

            let s = beatScale(tt);

            tx = cx + hp.x * s;
            ty = cy + hp.y * s;
          } else if (t < 11) {
            let tt = easeOutBack((t - 8) / 3);

            let hp = heartTargets[i];
            let sp = sophiaTargets[i];

            tx = lerp(cx + hp.x, cx + sp.x, tt);
            ty = lerp(cy + hp.y, cy + sp.y, tt);
          } else if (t < 14) {
            let tt = ease((t - 11) / 3);

            let sp = sophiaTargets[i];
            let tp = trangTargets[i];

            tx = lerp(cx + sp.x, cx + tp.x, tt);
            ty = lerp(cy + sp.y, cy + tp.y, tt);
          } else {
            let tt = ease((t - 14) / 4);

            let tp = trangTargets[i];
            let hp = heartTargets[i];

            tx = lerp(cx + tp.x, cx + hp.x, tt);
            ty = lerp(cy + tp.y, cy + hp.y, tt);
          }

          p.x += (tx - p.x) * 0.12;
          p.y += (ty - p.y) * 0.12;

          ctx.beginPath();

          ctx.fillStyle = `hsla(330,100%,75%,${p.alpha})`;

          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);

          ctx.fill();
        }
      }

      function animate(now) {
        update(now * 0.001);

        requestAnimationFrame(animate);
      }

      function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;

        cx = w / 2;
        cy = h / 2;

        initParticles();
      }

      window.addEventListener("resize", resize);

      resize();

      requestAnimationFrame(animate);
    </script>
    <div
      id="musicOverlay"
      style="
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #04040d, #0a1020);
        color: white;
        font-size: clamp(16px, 3vw, 22px);
        letter-spacing: 0.08em;
        cursor: pointer;
        user-select: none;
        transition: opacity 0.6s ease;
      "
    >
      Hãy nhấn vào màn hình để nghe nhạc 🎵
    </div>

    <audio id="bgMusic" loop preload="auto">
      <source src="music.mp3" type="audio/mpeg" />
    </audio>

    <script>
      const overlay = document.getElementById("musicOverlay");
      const music = document.getElementById("bgMusic");

      let started = false;

      function fadeIn(audio, duration = 1800) {
        audio.volume = 0;

        audio
          .play()
          .then(() => {
            const step = 40;
            const gain = step / duration;

            const fade = setInterval(() => {
              if (audio.volume < 0.65) {
                audio.volume += gain;
              } else {
                clearInterval(fade);
              }
            }, step);
          })
          .catch(() => {});
      }

      function startMusic() {
        if (started) return;
        started = true;

        fadeIn(music);

        // fade overlay
        overlay.style.opacity = "0";

        // remove overlay sau animation
        setTimeout(() => {
          overlay.remove();
        }, 600);
      }

      // bắt mọi loại interaction luôn
      overlay.addEventListener("pointerdown", startMusic, { once: true });
      overlay.addEventListener("touchstart", startMusic, { once: true });
      overlay.addEventListener("click", startMusic, { once: true });
    </script>
  </body>
</html>
